<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فیثاغورس کامل | محمد امین دشتبان</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep: #020b18;
            --navy: #061426;
            --teal: #00c8b4;
            --gold: #f5c842;
            --coral: #ff6b6b;
            --glow-teal: rgba(0,200,180,0.35);
            --glow-gold: rgba(245,200,66,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--deep);
            font-family: 'Vazirmatn', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated starfield background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,200,180,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(245,200,66,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6,20,38,0.9) 0%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
            opacity: 0;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: var(--op); transform: scale(1.2); }
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 540px;
            width: 100%;
            background: linear-gradient(160deg, rgba(255,255,255,0.055) 0%, rgba(0,200,180,0.04) 100%);
            border: 1px solid rgba(0,200,180,0.22);
            border-radius: 32px;
            padding: 32px 28px 24px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 30px 80px rgba(0,0,0,0.7),
                0 0 60px rgba(0,200,180,0.08);
            backdrop-filter: blur(20px);
            animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes cardIn {
            from { opacity:0; transform: translateY(30px) scale(0.97); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }

        /* Decorative corner accent */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; right: -1px;
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--teal) 0%, transparent 60%);
            border-radius: 0 32px 0 0;
            opacity: 0.12;
            pointer-events: none;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: -1px; left: -1px;
            width: 80px; height: 80px;
            background: linear-gradient(-45deg, var(--gold) 0%, transparent 60%);
            border-radius: 0 0 0 32px;
            opacity: 0.1;
            pointer-events: none;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 22px;
            animation: fadeUp 0.6s 0.1s both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--teal), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .subtitle-name {
            margin-top: 6px;
            font-size: 0.85rem;
            color: rgba(245,200,66,0.75);
            letter-spacing: 1px;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(0,200,180,0.12);
            border: 1px solid rgba(0,200,180,0.35);
            color: var(--teal);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Formula */
        .formula-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,200,180,0.18);
            border-radius: 20px;
            padding: 14px 18px;
            text-align: center;
            margin: 18px 0;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s 0.2s both;
        }
        .formula-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,200,180,0.04), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%,100% { transform: translateX(-100%); }
            50%      { transform: translateX(100%); }
        }
        .formula-text {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 2px;
            direction: ltr;
        }
        .formula-desc {
            color: rgba(0,200,180,0.7);
            font-size: 0.75rem;
            margin-top: 5px;
        }

        /* Canvas */
        .canvas-wrap {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 14px;
            margin: 0 0 18px;
            text-align: center;
            animation: fadeUp 0.6s 0.3s both;
        }
        canvas {
            border-radius: 14px;
            width: 100%;
            max-width: 260px;
            height: auto;
            background: #071020;
        }

        /* Inputs */
        .input-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            animation: fadeUp 0.6s 0.4s both;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .input-row label {
            width: 76px;
            font-weight: 700;
            color: var(--gold);
            font-size: 0.92rem;
            flex-shrink: 0;
        }
        .input-row input {
            flex: 1;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(0,200,180,0.2);
            padding: 11px 14px;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            font-weight: 700;
            color: #fff;
            font-family: 'Vazirmatn', monospace;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }
        .input-row input::-webkit-inner-spin-button,
        .input-row input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .input-row input:focus {
            outline: none;
            border-color: var(--teal);
            background: rgba(0,200,180,0.07);
            box-shadow: 0 0 0 3px rgba(0,200,180,0.12);
        }
        .input-row .unit {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .info-text {
            font-size: 0.72rem;
            color: rgba(0,200,180,0.6);
            text-align: center;
            margin-top: 10px;
            line-height: 1.5;
        }

        /* Button */
        .calc-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--teal), #009e8c);
            color: var(--deep);
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(0,200,180,0.3), 0 2px 6px rgba(0,0,0,0.5);
            transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
            animation: fadeUp 0.6s 0.5s both;
        }
        .calc-btn:hover {
            box-shadow: 0 6px 32px rgba(0,200,180,0.45), 0 2px 8px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #00e0c8, #00b8a0);
        }
        .calc-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 12px rgba(0,200,180,0.2);
        }
        .btn-icon { font-size: 1.2rem; }

        /* Result */
        .result-box {
            border-radius: 16px;
            padding: 16px 18px;
            min-height: 60px;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.7;
            transition: all 0.3s ease;
            border: 1px solid rgba(245,200,66,0.2);
            background: rgba(245,200,66,0.05);
            color: rgba(245,200,66,0.85);
            animation: fadeUp 0.6s 0.6s both;
        }
        .result-box.success {
            border-color: rgba(0,200,180,0.4);
            background: rgba(0,200,180,0.07);
            color: var(--teal);
            box-shadow: 0 0 20px rgba(0,200,180,0.1);
        }
        .result-box.error {
            border-color: rgba(255,107,107,0.4);
            background: rgba(255,107,107,0.07);
            color: var(--coral);
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--gold);
            display: block;
            margin: 4px 0;
        }

        /* Footer */
        footer {
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 14px;
            animation: fadeUp 0.6s 0.7s both;
        }
        .dev-name { font-weight: 700; color: var(--gold); font-size: 0.82rem; }
        .teacher-name { color: rgba(255,107,107,0.75); font-size: 0.78rem; margin-top: 3px; }

        /* Pulse ring on canvas wrap */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(0,200,180,0.2); }
            70% { box-shadow: 0 0 0 10px rgba(0,200,180,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,200,180,0); }
        }
        .canvas-wrap.pulse { animation: pulse-ring 0.6s ease-out; }
    </style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<div class="card">
    <div class="header">
        <div class="title">📐 فیثاغورس هوشمند</div>
        <div class="subtitle-name">✦ محمد امین دشتبان ✦</div>
        <div class="badge-row">
            <span class="badge">a² + b² = c²</span>
            <span class="badge">هر ۲ ضلع را وارد کن</span>
        </div>
    </div>

    <div class="formula-box">
        <div class="formula-text">a² + b² = c²</div>
        <div class="formula-desc">a و b = ضلع‌های قائمه &nbsp;|&nbsp; c = وتر</div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="triangleCanvas" width="260" height="200"></canvas>
    </div>

    <div class="input-group">
        <div class="input-row">
            <label>📐 ضلع a :</label>
            <input type="number" id="sideA" placeholder="ضلع a" value="3" step="any">
            <span class="unit">واحد</span>
        </div>
        <div class="input-row">
            <label>📐 ضلع b :</label>
            <input type="number" id="sideB" placeholder="ضلع b" value="4" step="any">
            <span class="unit">واحد</span>
        </div>
        <div class="input-row">
            <label>🔺 وتر c :</label>
            <input type="number" id="sideC" placeholder="وتر c" value="" step="any">
            <span class="unit">واحد</span>
        </div>
        <div class="info-text">💡 فقط <strong>دو</strong> مقدار وارد کن — سومی محاسبه می‌شه</div>
    </div>

    <button class="calc-btn" id="calcBtn">
        <span class="btn-icon">🧮</span>
        محاسبه کن
    </button>

    <div class="result-box" id="resultArea">نتیجه اینجا نشان داده می‌شود</div>

    <footer>
        <div class="dev-name">👨‍💻 محمد امین دشتبان</div>
        <div class="teacher-name">📚 دبیر: آقای نجف‌پور</div>
    </footer>
</div>

<script>
    /* ── Starfield ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.2 + 0.5;
        s.style.cssText = `
            width:${size}px; height:${size}px;
            top:${Math.random()*100}%;
            left:${Math.random()*100}%;
            --dur:${(Math.random()*3+2).toFixed(1)}s;
            --op:${(Math.random()*0.5+0.15).toFixed(2)};
            animation-delay:${(Math.random()*4).toFixed(1)}s;
        `;
        starsEl.appendChild(s);
    }

    /* ── Canvas ── */
    const canvas = document.getElementById('triangleCanvas');
    const ctx = canvas.getContext('2d');

    function drawTriangle(a, b, c) {
        const dpr = window.devicePixelRatio || 1;
        const displayW = canvas.clientWidth || 260;
        const displayH = canvas.clientHeight || 200;
        canvas.width = displayW * dpr;
        canvas.height = displayH * dpr;
        ctx.scale(dpr, dpr);
        const w = displayW, h = displayH;
        ctx.clearRect(0, 0, w, h);

        // Background grid
        ctx.strokeStyle = 'rgba(0,200,180,0.06)';
        ctx.lineWidth = 1;
        for (let x = 0; x < w; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
        for (let y = 0; y < h; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

        if (!a || !b || !c || a <= 0 || b <= 0 || c <= 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.font = '13px Vazirmatn, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('مقادیر معتبر وارد کنید', w/2, h/2);
            return;
        }

        const maxSide = Math.max(a, b);
        const scale = Math.min((w - 80) / maxSide, (h - 60) / maxSide);
        const ox = 48, oy = h - 30;
        const bx = ox + b * scale;
        const ay = oy - a * scale;

        // Shadow glow
        ctx.save();
        ctx.shadowColor = 'rgba(0,200,180,0.6)';
        ctx.shadowBlur = 18;

        // Fill with gradient
        const grad = ctx.createLinearGradient(ox, ay, bx, oy);
        grad.addColorStop(0, 'rgba(0,200,180,0.22)');
        grad.addColorStop(1, 'rgba(245,200,66,0.12)');
        ctx.beginPath();
        ctx.moveTo(ox, oy); ctx.lineTo(bx, oy); ctx.lineTo(ox, ay);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Stroke
        ctx.strokeStyle = '#00c8b4';
        ctx.lineWidth = 2.2;
        ctx.stroke();
        ctx.restore();

        // Hypotenuse in gold
        ctx.save();
        ctx.shadowColor = 'rgba(245,200,66,0.5)';
        ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.moveTo(bx, oy); ctx.lineTo(ox, ay);
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();

        // Right-angle marker
        const sq = 11;
        ctx.fillStyle = 'rgba(245,200,66,0.85)';
        ctx.fillRect(ox + 2, oy - sq - 2, sq, sq);
        ctx.strokeStyle = '#f5c842'; ctx.lineWidth = 1;
        ctx.strokeRect(ox + 2, oy - sq - 2, sq, sq);

        // Labels
        ctx.font = 'bold 13px Vazirmatn, monospace';
        ctx.textAlign = 'left';

        ctx.fillStyle = '#00e8d0';
        ctx.fillText(`a=${fmt(a)}`, ox - 42, (oy + ay) / 2 + 5);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#7dd8ff';
        ctx.fillText(`b=${fmt(b)}`, (ox + bx) / 2, oy + 16);

        ctx.fillStyle = '#f5c842';
        const cx2 = (ox + bx) / 2 + 16;
        const cy2 = (oy + ay) / 2 - 10;
        ctx.fillText(`c=${fmt(c)}`, cx2, cy2);
    }

    function fmt(n) { return Math.round(n * 100) / 100; }

    /* ── Compute ── */
    function compute() {
        let a = parseFloat(document.getElementById('sideA').value);
        let b = parseFloat(document.getElementById('sideB').value);
        let c = parseFloat(document.getElementById('sideC').value);
        const res = document.getElementById('resultArea');

        const v = n => !isNaN(n) && n > 0;
        const count = [a,b,c].filter(v).length;

        if (count < 2) {
            setResult(res, '⚠️ لطفاً دو مقدار از اضلاع را وارد کن!', 'error');
            drawTriangle(0,0,0); return;
        }
        if (count > 2) {
            setResult(res, '⚠️ فقط دو مقدار وارد کن — سومی را خالی بذار!', 'error');
            drawTriangle(0,0,0); return;
        }

        let result, label, formula;

        if (v(a) && v(b)) {
            result = Math.sqrt(a*a + b*b);
            label = 'وتر (c)';
            formula = `√(${a}² + ${b}²) = √${a*a+b*b} ≈ ${fmt(result)}`;
            document.getElementById('sideC').value = fmt(result);
            drawTriangle(a, b, result);
        } else if (v(a) && v(c)) {
            if (c <= a) { setResult(res, '⚠️ وتر باید بزرگتر از ضلع a باشد!', 'error'); drawTriangle(0,0,0); return; }
            result = Math.sqrt(c*c - a*a);
            label = 'ضلع b';
            formula = `√(${c}² − ${a}²) = √${c*c-a*a} ≈ ${fmt(result)}`;
            document.getElementById('sideB').value = fmt(result);
            drawTriangle(a, result, c);
        } else {
            if (c <= b) { setResult(res, '⚠️ وتر باید بزرگتر از ضلع b باشد!', 'error'); drawTriangle(0,0,0); return; }
            result = Math.sqrt(c*c - b*b);
            label = 'ضلع a';
            formula = `√(${c}² − ${b}²) = √${c*c-b*b} ≈ ${fmt(result)}`;
            document.getElementById('sideA').value = fmt(result);
            drawTriangle(result, b, c);
        }

        res.className = 'result-box success';
        res.innerHTML = `✅ <strong>${label}</strong> محاسبه شد<br><span class="result-value">${fmt(result)} واحد</span><small style="opacity:.7;font-size:.78rem">${formula}</small>`;

        // Pulse canvas wrap
        const wrap = document.getElementById('canvasWrap');
        wrap.classList.remove('pulse');
        void wrap.offsetWidth;
        wrap.classList.add('pulse');
    }

    function setResult(el, msg, type) {
        el.className = `result-box ${type}`;
        el.innerHTML = msg;
    }

    document.getElementById('calcBtn').addEventListener('click', compute);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') compute(); });

    // Initial draw
    drawTriangle(3, 4, 5);
</script>
</body>
</html>
